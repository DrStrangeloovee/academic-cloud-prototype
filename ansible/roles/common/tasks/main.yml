---
- name: Wait for cloud-init to finish (avoids apt-daily lock races)
  ansible.builtin.command: cloud-init status --wait
  register: common_cloud_init
  changed_when: false
  failed_when: "'done' not in common_cloud_init.stdout"

- name: Set timezone
  community.general.timezone:
    name: "{{ common_timezone }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    lock_timeout: 300

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ common_base_packages }}"
    state: present
    lock_timeout: 300
