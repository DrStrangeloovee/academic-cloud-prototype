[tools]
opentofu = "1.11.6"
pipx = "1.11.1"
python = "3.14.4"
ansible-core = "2.20.5"
"pipx:ansible-lint" = "26.4.0"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.ansible-collections]
description = "Install Ansible collections from ansible/requirements.yml"
run = "ansible-galaxy collection install -r ansible/requirements.yml"
sources = ["ansible/requirements.yml"]
